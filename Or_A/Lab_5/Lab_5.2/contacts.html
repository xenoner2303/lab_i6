<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HolidayTime - Контакти</title>
    <link href="https://fonts.googleapis.com/css2?family=PT+Sans:ital,wght@0,400;0,700;1,400;1,700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <header class="main-header">
        <div class="header-container">
            <div class="logo-area">
                <img src="Logo.png" alt="HolidayTime Logo" class="logo-placeholder">
            </div>
            
            <nav class="main-nav">
                <a href="index.html" class="nav-item">ГОЛОВНА</a>
                <a href="about.html" class="nav-item">ПРО НАС</a>
                <a href="booking.html" class="nav-item">ЗАБРОНЮВАТИ</a>
                <a href="contacts.html" class="nav-item active">КОНТАКТИ</a>
                <a href="profile.html" class="nav-item">ОСОБИСТИЙ КАБІНЕТ</a>
            </nav>

            <div class="lang-selector-wrapper">
                <div class="lang-icon">🌐</div>
                <select class="lang-select">
                    <option value="ua" selected>UA</option>
                    <option value="en">EN</option>
                    <option value="fr">FR</option>
                </select>
            </div>
        </div>
    </header>

    <div class="page-title-strip">
        <div class="title-strip-container">
            <h2>Контакти</h2>
        </div>
    </div>

    <main class="content-wrapper contacts-page-wrapper">
        <section class="contacts-top-row">
            <div class="contact-block">
                <h3 class="contact-block-title">Телефон</h3>
                <p class="contact-block-text">+38(097)119-89-83</p>
            </div>

            <div class="contact-block">
                <h3 class="contact-block-title">Графік роботи</h3>
                <div class="contact-block-text schedule-text">
                    <p>пн-пт 08:00-22:00</p>
                    <p>сб 09:00-21:00</p>
                    <p>вс 10:00-20:00</p>
                </div>
            </div>

            <div class="contact-block">
                <h3 class="contact-block-title">Ел. пошта</h3>
                <p class="contact-block-text">hello@gmail.com</p>
            </div>

        </section>

        <section class="contacts-bottom-row">
            
            <div class="contact-block address-block">
                <h3 class="contact-block-title">Адреса офісу</h3>
                <p class="contact-block-text">м. Київ, вул. Малевича, буд. 4</p>
            </div>

            <div class="map-container-wrapper">
                <iframe src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d28754.791026604373!2d30.486545781733746!3d50.43013872077433!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x40d4cf1e3ee89c35%3A0x9004f0857426acae!2z0LLRg9C70LjRhtGPINCa0LDQt9C40LzQuNGA0LAg0JzQsNC70LXQstC40YfQsCwgNCwg0JrQuNGX0LIsIDAyMDAw!5e0!3m2!1sru!2sua!4v1779190232350!5m2!1sru!2sua" width="600" height="450" style="border:0;" allowfullscreen="" loading="lazy" referrerpolicy="no-referrer-when-downgrade"></iframe> 
            </div>

        </section>

    <footer class="main-footer">
        <p>&copy; 2021 HolidayTime. All rights reserved.</p>
