<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<title>Календар</title>

<style>
    body {
        font-family: Arial;
        text-align: center;
    }

    h1 {
        font-size: 48px;
    }

    table {
        border-collapse: collapse;
        margin: 0 auto;
    }

    td, th {
        border: 1px solid black;
        width: 100px;
        height: 80px;
        font-size: 28px;
    }

    th {
        background-color: #eee;
    }

    /* сірі (січень і березень) */
    tbody tr:first-child td:nth-child(2),
    tbody tr:first-child td:nth-child(3),
    tbody tr:first-child td:nth-child(4),
    tbody tr:first-child td:nth-child(5),
    tbody tr:first-child td:nth-child(6),
    tbody tr:first-child td:nth-child(7),
    tbody tr:last-child  td:nth-child(8) {
        color: gray;
    }

    /* вихідні */
    tbody td:nth-child(2),
    tbody td:nth-child(8) {
        color: green;
    }

    /* святкові (наприклад 14 лютого) */
    tbody tr:nth-child(3) td:nth-child(7) {
        color: red;
    }

    /* день народження — 7 лютого */
    tbody tr:nth-child(2) td:nth-child(7) {
        background-color: yellow;
        color: blue;
        font-weight: bold;
    }

</style>
</head>

<body>

<h1>February 2025</h1>

<table>
    <thead>
        <tr>
            <th>No.</th>
            <th>Sunday</th>
            <th>Monday</th>
            <th>Tuesday</th>
            <th>Wednesday</th>
            <th>Thursday</th>
            <th>Friday</th>
            <th>Saturday</th>
        </tr>
    </thead>

    <tbody>
        <tr>
            <td>1</td>
            <td>26</td>
            <td>27</td>
            <td>28</td>
            <td>29</td>
            <td>30</td>
            <td>31</td>
            <td>1</td>
        </tr>

        <tr>
            <td>2</td>
            <td>2</td>
            <td>3</td>
            <td>4</td>
            <td>5</td>
            <td>6</td>
            <td>7</td>
            <td>8</td>
        </tr>

        <tr>
            <td>3</td>
            <td>9</td>
            <td>10</td>
            <td>11</td>
            <td>12</td>
            <td>13</td>
            <td>14</td>
            <td>15</td>
        </tr>

        <tr>
            <td>4</td>
            <td>16</td>
            <td>17</td>
            <td>18</td>
            <td>19</td>
            <td>20</td>
            <td>21</td>
            <td>22</td>
        </tr>

        <tr>
            <td>5</td>
            <td>23</td>
            <td>24</td>
            <td>25</td>
            <td>26</td>
            <td>27</td>
            <td>28</td>
            <td>1</td>
        </tr>
    </tbody>

</table>

</body>
</html>
