<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lab4</title>
    <style>
        h1{
            text-align: center;
        }
        table{
            border-collapse: collapse;
            margin: 0 auto;
        }
        td, th{
            padding: 5px;
            border-spacing: 0;
            width: 50px;
            height: 50px;
            text-align: center;
        }
        tr:not(:first-child):not(:last-child) td:nth-child(n+7){
            color: green;
        }
        tr:nth-child(2) td:nth-child(2),
        tr:nth-child(6) td:nth-child(n+5)
        {
            color: grey;
        }
        tr:nth-child(2) td:nth-child(3),
        tr:nth-child(3) td:nth-child(8),
        tr:nth-child(5) td:nth-child(2)
        {
            color: red !important;
        }
    </style>
</head>
<body>
    <h1>September 2026</h1>
    <table border="1" border-color="black">
        <tr>
            <th scope="col">No</th>
            <th scope="col">Пон</th>
            <th scope="col">Вт</th>
            <th scope="col">Ср</th>
            <th scope="col">Чт</th>
            <th scope="col">Пт</th>
            <th scope="col">Сб</th>
            <th scope="col">Нед</th>
        </tr>
        <tr>
            <th scope="row">1</th>
            <td>31</td>
            <td>1</td>
            <td>2</td>
            <td>3</td>
            <td>4</td>
            <td>5</td>
            <td>6</td>
        </tr>
        <tr>
            <th scope="row">2</th>
            <td>7</td>
            <td>8</td>
            <td>9</td>
            <td>10</td>
            <td>11</td>
            <td>12</td>
            <td>13</td>
        </tr>
        <tr>
            <th scope="row">3</th>
            <td>14</td>
            <td>15</td>
            <td>16</td>
            <td>17</td>
            <td>18</td>
            <td>19</td>
            <td>20</td>
        </tr>
         <tr>
            <th scope="row">4</th>
            <td>21</td>
            <td>22</td>
            <td>23</td>
            <td>24</td>
            <td style="color:purple">25</td>
            <td>26</td>
            <td>27</td>
        </tr>
         <tr>
            <th scope="row">5</th>
            <td>28</td>

            <td>30</td>
            <td>1</td>
            <td>2</td>
            <td>3</td>
            <td>4</td>
        </tr>
    </table>
</body>
</html>
